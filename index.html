<!DOCTYPE html>
<html>
<head>
    <title>EDUTRACK</title>
</head>
<body>

<h2>📚 EDUTRACK</h2>

<a href="/logout">Logout</a>

<h3>Add Task</h3>

<form method="POST">
    <input name="task" placeholder="Task" required>
    <input type="date" name="date" required>
    <input type="time" name="time" required>

    <select name="status">
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Done</option>
    </select>

    <button type="submit">Add Task</button>
</form>

<hr>

<h3>Tasks</h3>

{% for task in tasks %}
<div style="border:1px solid black; padding:10px; margin:10px;">

    <p><b>Task:</b> {{ task.task }}</p>
    <p><b>Deadline:</b> {{ task.deadline }}</p>
    <p><b>Status:</b> {{ task.status }}</p>
    <p><i>{{ task.quote }}</i></p>

    <!-- UPDATE STATUS -->
    <form action="/update_status/{{ task.id }}" method="POST">
        <select name="status">
            <option {% if task.status == "Not Started" %}selected{% endif %}>Not Started</option>
            <option {% if task.status == "In Progress" %}selected{% endif %}>In Progress</option>
            <option {% if task.status == "Done" %}selected{% endif %}>Done</option>
        </select>

        <button type="submit">Update Status</button>
    </form>

    <!-- DELETE -->
    <a href="/delete/{{ task.id }}">Delete</a>

</div>
{% endfor %}

</body>
</html>
